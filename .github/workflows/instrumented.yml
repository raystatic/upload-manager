name: Instrumented Tests

# Runs the androidTest suite on an Android emulator, with the Firebase Emulator
# Suite (Auth + Storage) provided via `firebase emulators:exec`. Separate from the
# fast unit-test CI so the slow emulator job doesn't gate every push's feedback.
on:
  push:
    branches: [ "claude/nifty-bohr-kmng1s" ]
  workflow_dispatch:

jobs:
  androidTest:
    # ubuntu-22.04, not ubuntu-latest (24.04): the newer image breaks
    # android-emulator-runner's emulator/adb boot on hosted runners.
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # JDK 21: firebase-tools requires Java 21+ for its emulators. Gradle runs on
      # 21 and auto-detects the runner's preinstalled JDK 17 for the build toolchain
      # (same as the main CI).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Instrumented tests against the Firebase emulators
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: default
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Single line: android-emulator-runner executes the script line-by-line,
          # so `cd` and `\` continuations don't persist across lines.
          script: cd firebase && firebase emulators:exec --only auth,firestore,storage --project demo-upload-manager "cd $GITHUB_WORKSPACE && ./gradlew :upload-manager:connectedDebugAndroidTest --stacktrace"

      - name: Upload androidTest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-report
          path: upload-manager/build/reports/androidTests/
